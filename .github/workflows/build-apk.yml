name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icon & splash
        run: npx capacitor-assets generate --android --iconBackgroundColor '#05060a' --iconBackgroundColorDark '#05060a' --splashBackgroundColor '#05060a' --splashBackgroundColorDark '#05060a' || echo "asset generation skipped (using defaults)"

      - name: Sync web assets
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk VOLT-v1.1-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VOLT-debug-apk
          path: VOLT-v1.1-debug.apk
          if-no-files-found: error

      - name: Publish APK to Release (on manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1
          name: VOLT v1.1
          files: VOLT-v1.1-debug.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
